name: Build aiolos

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: Build (matrix)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build aiolos
        run: |
          mkdir -p build
          LDFLAGS="-X main.version=${GITHUB_REF_NAME:-dev} -X main.commit=${GITHUB_SHA} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          OUT=build/aiolos-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUT=${OUT}.exe
          fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "$LDFLAGS" -o "$OUT" ./cmd/aiolos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aiolos-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/aiolos-${{ matrix.goos }}-${{ matrix.goarch }}*
